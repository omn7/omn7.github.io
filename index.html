<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #000; /* Black Background */
            color: white;
            text-align: center;
        }
        .container {
            animation: fadeIn 1.5s ease-in-out;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress {
            height: 100%;
            width: 0;
            background: white;
            animation: loading 3s linear forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes loading {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
    <script>
        setTimeout(() => {
            window.location.href = "https://om7.vercel.app/"; // Change to your target URL
        }, 3000);
    </script>
</head>
<body>
    <div class="container">
        <h1>Hold tight! Redirecting you...</h1>
        <p>You'll be taken to the new page in a moment URL has been changed.</p>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>
</body>
</html>
